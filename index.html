<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arcade Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Game Container -->
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- HUD -->
    <div id="hud">
        <span id="health">Health: 1000</span>
        <span id="coins">Coins: 200</span>
        <span id="currentWeapon">Weapon: Pistol</span>
    </div>

    <!-- Buttons -->
    <button id="shopBtn">Shop</button>
    <button id="switchBtn">Switch Weapon</button>

    <!-- Joystick -->
    <div id="joystickContainer">
        <div id="joystick"></div>
    </div>

    <!-- Shop Overlay -->
    <div id="shopOverlay">
        <div id="shopContent"></div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen">
        <div id="gameOverBox">
            <h1>You Lost!</h1>
            <button onclick="resetGame()">Retry</button>
        </div>
    </div>

    <!-- Script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
